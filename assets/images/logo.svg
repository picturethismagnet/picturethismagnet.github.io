<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B7A70"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="magnetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A6B62"/>
      <stop offset="100%" style="stop-color:#0B7A70"/>
    </linearGradient>
  </defs>

  <!-- Rounded square photo frame -->
  <rect x="80" y="100" width="352" height="312" rx="28" ry="28" fill="url(#tealGrad)" />
  
  <!-- Inner white photo area -->
  <rect x="108" y="128" width="296" height="256" rx="16" ry="16" fill="#FFFFFF" />

  <!-- Mountain scene inside the photo -->
  <!-- Sky gradient hint -->
  <rect x="108" y="128" width="296" height="256" rx="16" ry="16" fill="#E0F7FA" />
  
  <!-- Sun -->
  <circle cx="320" cy="195" r="30" fill="#FBBF24" opacity="0.9"/>
  
  <!-- Back mountain -->
  <polygon points="108,384 200,240 310,320 404,260 404,384" fill="#5EEAD4" opacity="0.6"/>
  
  <!-- Front mountain -->
  <polygon points="108,384 180,270 280,340 360,280 404,330 404,384" fill="#0B7A70" opacity="0.8"/>
  
  <!-- Ground -->
  <rect x="108" y="360" width="296" height="24" rx="0" ry="0" fill="#0A6B62" opacity="0.5"/>
  <!-- Round the bottom corners to match the frame -->
  <rect x="108" y="368" width="296" height="16" rx="16" ry="16" fill="#0A6B62" opacity="0.5"/>

  <!-- Camera lens circle at top center -->
  <circle cx="256" cy="92" r="26" fill="#0A6B62" stroke="#FFFFFF" stroke-width="4"/>
  <circle cx="256" cy="92" r="14" fill="#1E293B"/>
  <circle cx="256" cy="92" r="8" fill="#06B6D4" opacity="0.7"/>
  <circle cx="250" cy="87" r="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- U-shaped magnet at bottom right -->
  <g transform="translate(370, 370) rotate(-30)">
    <!-- Left arm of magnet -->
    <rect x="0" y="0" width="28" height="70" rx="4" fill="#EF4444"/>
    <rect x="0" y="50" width="28" height="20" rx="2" fill="#94A3B8"/>
    
    <!-- Right arm of magnet -->
    <rect x="52" y="0" width="28" height="70" rx="4" fill="#3B82F6"/>
    <rect x="52" y="50" width="28" height="20" rx="2" fill="#94A3B8"/>
    
    <!-- Bottom curve connecting arms -->
    <path d="M0,4 Q0,-30 40,-30 Q80,-30 80,4" fill="none" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
    <path d="M14,-18 Q40,-40 66,-18" fill="none" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" opacity="0"/>
    
    <!-- Magnetic field lines -->
    <path d="M14,68 Q14,85 40,85 Q66,85 66,68" fill="none" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
    <path d="M8,68 Q8,95 40,95 Q72,95 72,68" fill="none" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Small sparkle/star accents -->
  <g fill="#5EEAD4" opacity="0.7">
    <polygon points="130,110 133,118 140,118 134,123 136,130 130,126 124,130 126,123 120,118 127,118" />
    <polygon points="390,120 392,126 398,126 393,129 395,135 390,132 385,135 387,129 382,126 388,126" transform="scale(0.7) translate(170, 50)" />
  </g>
</svg>

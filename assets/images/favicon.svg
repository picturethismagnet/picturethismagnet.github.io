<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B7A70"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Rounded photo frame -->
  <rect x="6" y="10" width="52" height="46" rx="6" fill="url(#g)"/>
  <!-- White photo area -->
  <rect x="10" y="14" width="44" height="38" rx="4" fill="#fff"/>
  <!-- Teal mountain scene -->
  <rect x="10" y="14" width="44" height="38" rx="4" fill="#E0F7FA"/>
  <circle cx="40" cy="24" r="5" fill="#FBBF24" opacity="0.9"/>
  <polygon points="10,52 22,32 34,42 48,30 54,38 54,52" fill="#0B7A70" opacity="0.85"/>
  <rect x="10" y="48" width="44" height="4" rx="2" fill="#0A6B62" opacity="0.5"/>
  <!-- Camera lens -->
  <circle cx="32" cy="9" r="5" fill="#0A6B62" stroke="#fff" stroke-width="1.5"/>
  <circle cx="32" cy="9" r="2.5" fill="#1E293B"/>
  <circle cx="31" cy="8" r="1" fill="#fff" opacity="0.7"/>
  <!-- Tiny magnet -->
  <g transform="translate(46, 48) rotate(-30) scale(0.35)">
    <rect x="0" y="0" width="28" height="50" rx="4" fill="#EF4444"/>
    <rect x="0" y="35" width="28" height="15" rx="2" fill="#94A3B8"/>
    <rect x="52" y="0" width="28" height="50" rx="4" fill="#3B82F6"/>
    <rect x="52" y="35" width="28" height="15" rx="2" fill="#94A3B8"/>
    <path d="M0,4 Q0,-25 40,-25 Q80,-25 80,4" fill="none" stroke="#EF4444" stroke-width="28" stroke-linecap="round"/>
  </g>
</svg>
